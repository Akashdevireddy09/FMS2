<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FMS Register</title>
  <link rel="stylesheet" href="css/register.css">
  <style>
    /* ── Validation Feedback Styles ── */
    .form-row {
      position: relative;
    }

    .field-error {
      display: none;
      color: #d32f2f;
      font-size: 0.75rem;
      margin-top: 3px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .field-error.visible {
      display: block;
    }

    input.invalid,
    select.invalid {
      border-color: #d32f2f !important;
      box-shadow: 0 0 0 2px rgba(211, 47, 47, 0.15) !important;
      outline: none;
    }

    input.valid,
    select.valid {
      border-color: #388e3c !important;
    }

    input[readonly] {
      background-color: #f5f5f5;
      cursor: not-allowed;
      color: #888;
    }
  </style>
</head>
<body data-page="register">
  <div class="container">
    <div class="topbar">
      <div class="brand">Flight Management System</div>
      <div class="nav-links">
        <a href="index (1).html"><button type="button" class="secondary">Back To Sign In</button></a>
      </div>
    </div>

    <section class="panel">
      <h2 class="form-title">Customer Registration</h2>
      <div id="registerMsg" class="msg"></div>

      <form id="registerForm" class="form-grid" novalidate>

        <!-- 1. USER ID -->
        <div class="form-row">
          <label for="newUserId">User Id <span class="req">*</span></label>
          <input id="newUserId" type="text" placeholder="Automatically Generated" readonly>
          <span class="field-error" id="err-newUserId"></span>
        </div>

        <!-- 2. USERNAME -->
        <div class="form-row">
          <label for="userName">User Name <span class="req">*</span></label>
          <input id="userName" type="text" title="Full name of customer" required
                 minlength="5" maxlength="26">
          <span class="field-error" id="err-userName"></span>
        </div>

        <!-- 3. PASSWORD -->
        <div class="form-row">
          <label for="regPassword">Password <span class="req">*</span></label>
          <input id="regPassword" type="password"
                 title="8–15 chars with uppercase, lowercase and special character"
                 required minlength="8" maxlength="15">
          <span class="field-error" id="err-regPassword"></span>
        </div>

        <!-- Customer Category (existing, unchanged) -->
        <div class="form-row">
          <label for="customerCategory">Customer Category <span class="req">*</span></label>
          <select id="customerCategory" title="Select membership category" required>
            <option value="">Select</option>
            <option value="Silver">Silver</option>
            <option value="Gold">Gold</option>
            <option value="Platinum">Platinum</option>
          </select>
          <span class="field-error" id="err-customerCategory"></span>
        </div>

        <!-- 4. MOBILE NUMBER -->
        <div class="form-row">
          <label for="phone">Phone <span class="req">*</span></label>
          <input id="phone" type="tel" title="10-digit mobile number starting with 6-9"
                 required maxlength="10">
          <span class="field-error" id="err-phone"></span>
        </div>

        <!-- 5. EMAIL -->
        <div class="form-row">
          <label for="email">Email Id <span class="req">*</span></label>
          <input id="email" type="text" title="Valid @gmail.com or @tcs.com address"
                 required maxlength="40">
          <span class="field-error" id="err-email"></span>
        </div>

        <!-- Address 1 (existing, unchanged) -->
        <div class="form-row">
          <label for="address1">Address 1 <span class="req">*</span></label>
          <input id="address1" type="text" title="Primary address line" required>
          <span class="field-error" id="err-address1"></span>
        </div>

        <!-- Address 2 (existing, unchanged) -->
        <div class="form-row">
          <label for="address2">Address 2 </label>
          <input id="address2" type="text" title="Secondary address line">
          <span class="field-error" id="err-address2"></span>
        </div>

        <!-- 9. CITY -->
        <div class="form-row">
          <label for="city">City <span class="req">*</span></label>
          <input id="city" type="text" title="City name (alphabets only)"
                 required minlength="4" maxlength="20">
          <span class="field-error" id="err-city"></span>
        </div>

        <!-- 6. STATE (dropdown - all 29 Indian states) -->
        <div class="form-row">
          <label for="state">State <span class="req">*</span></label>
          <select id="state" title="Select your state" required>
            <option value="">Select State</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
            <option value="Assam">Assam</option>
            <option value="Bihar">Bihar</option>
            <option value="Chhattisgarh">Chhattisgarh</option>
            <option value="Goa">Goa</option>
            <option value="Gujarat">Gujarat</option>
            <option value="Haryana">Haryana</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Jharkhand">Jharkhand</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Kerala">Kerala</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Manipur">Manipur</option>
            <option value="Meghalaya">Meghalaya</option>
            <option value="Mizoram">Mizoram</option>
            <option value="Nagaland">Nagaland</option>
            <option value="Odisha">Odisha</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Sikkim">Sikkim</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Telangana">Telangana</option>
            <option value="Tripura">Tripura</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Uttarakhand">Uttarakhand</option>
            <option value="West Bengal">West Bengal</option>
            <option value="Jammu and Kashmir">Jammu and Kashmir</option>
          </select>
          <span class="field-error" id="err-state"></span>
        </div>

        <!-- 7. COUNTRY (pre-selected India, readonly) -->
        <div class="form-row">
          <label for="country">Country <span class="req">*</span></label>
          <select id="country" title="Country" required>
            <option value="India" selected>India</option>
          </select>
          <span class="field-error" id="err-country"></span>
        </div>

        <!-- 8. ZIP CODE -->
        <div class="form-row">
          <label for="zipCode">Zip Code <span class="req">*</span></label>
          <input id="zipCode" type="text" title="Exactly 6-digit zip code"
                 required maxlength="6">
          <span class="field-error" id="err-zipCode"></span>
        </div>

        <!-- 10. DATE OF BIRTH (max: Dec 31 2009) -->
        <div class="form-row full">
          <label for="dob">Date Of Birth <span class="req">*</span></label>
          <input id="dob" type="date" title="Date of birth (before 2010)"
                 required max="2009-12-31">
          <span class="field-error" id="err-dob"></span>
        </div>

        <div class="form-row full actions">
          <button type="submit">Register</button>
          <a href="index (1).html"><button type="button" class="secondary">Cancel</button></a>
        </div>
      </form>
    </section>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/core/security.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/modules/authentication.module.js"></script>
  <script src="js/app.bootstrap.js"></script>
</body>
</html>
