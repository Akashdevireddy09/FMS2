<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Trail - Admin Portal</title>
  <link rel="stylesheet" href="../css/admin_dashboard.css">
</head>
<body data-page="admin-audit">
  <div class="container">
    <header class="topbar admin-navbar">
      <div class="admin-brand-block">
        <p class="admin-brand-kicker">Operations Console</p>
        <h1 class="brand">FMS Admin Dashboard</h1>
      </div>

      <nav class="admin-nav-links" aria-label="Admin sections">
        <a href="admin_dashboard.html" class="secondary nav-tab nav-tab-home">Home</a>

        <div class="nav-dropdown">
          <button type="button" class="secondary nav-tab">Carrier Management</button>
          <div class="nav-dropdown-menu">
            <a href="add-carrier.html">Add Carrier</a>
            <a href="manage-carriers.html">Manage Carriers</a>
          </div>
        </div>

        <div class="nav-dropdown">
          <button type="button" class="secondary nav-tab">Flight Management</button>
          <div class="nav-dropdown-menu">
            <a href="add-flight.html">Add Flight</a>
            <a href="manage-flights.html">Manage Flights</a>
          </div>
        </div>

        <div class="nav-dropdown">
          <button type="button" class="secondary nav-tab">Flight Schedule</button>
          <div class="nav-dropdown-menu">
            <a href="admin_schedule.html">All Schedules</a>
            <a href="admin_schedule.html?option=add">Add Schedule</a>
          </div>
        </div>

        <a href="admin_users.html?option=all" class="secondary nav-tab">User Management</a>

        <div class="nav-dropdown">
          <button type="button" class="secondary nav-tab">Analytics</button>
          <div class="nav-dropdown-menu">
            <a href="admin_analytics.html">KPI Summary</a>
            <a href="admin_analytics.html?option=inventory">Seat Inventory</a>
          </div>
        </div>

        <div class="nav-dropdown">
          <button type="button" class="secondary nav-tab">Audit Trail</button>
          <div class="nav-dropdown-menu">
            <a href="admin_audit.html?option=recent">Recent Actions</a>
          </div>
        </div>
      </nav>

      <div class="admin-session-block">
        <span class="session-pill"><strong id="adminName">Admin</strong></span>
        <button id="adminLogoutBtn" type="button" class="danger">Sign Out</button>
      </div>
    </header>

    <div id="adminMsg" class="msg"></div>

    <section class="panel">
      <h2 class="form-title">Admin Audit Trail</h2>
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Admin Id</th>
            <th>Action</th>
            <th>Entity</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody id="auditBody"></tbody>
      </table>
      <div class="actions">
        <button id="backBtn" type="button" class="secondary">Back to Dashboard</button>
      </div>
    </section>
  </div>

  <script src="../js/core/storage.js"></script>
  <script src="../js/core/security.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/app.bootstrap.js"></script>
  <script src="../js/modules/admin-audit.module.js"></script>
</body>
</html>
