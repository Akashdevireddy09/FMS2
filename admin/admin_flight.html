<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Flight Management</title>
</head>
<body>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var option = params.get("option") || "all";
      if (option === "add") {
        window.location.replace("add-flight.html");
        return;
      }
      window.location.replace("manage-flights.html");
    })();
  </script>
</body>
</html>
