<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Module</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="payment">
  <div class="container">
    <section class="panel">
      <h2 class="form-title">Payment Module</h2>
      <div id="paymentMsg" class="msg"></div>

      <div class="card">
        <p><strong>Booking Id:</strong> <span id="bookingRef">N/A</span></p>
        <p><strong>Journey:</strong> <span id="journeyRef">N/A</span></p>
        <p><strong>Date Of Travel:</strong> <span id="travelDateRef">N/A</span></p>
        <p><strong>Tickets:</strong> <span id="ticketsRef">0</span></p>
      </div>

      <div id="paymentBreakdown" class="card" style="margin-top: 12px;"></div>

      <div class="form-row" style="margin-top: 12px;">
        <label for="paymentMethod">Payment Method</label>
        <select id="paymentMethod">
          <option value="credit">Credit Card</option>
          <option value="debit">Debit Card</option>
          <option value="netbanking">Net Banking</option>
          <option value="upi">UPI</option>
        </select>
      </div>

      <div id="cardSection" class="card">
        <div class="form-row"><label for="cardNumber">Card Number</label><input id="cardNumber" maxlength="16"></div>
        <div class="form-row"><label for="expiry">Expiry</label><input id="expiry" type="month"></div>
        <div class="form-row"><label for="cvv">CVV</label><input id="cvv" maxlength="3"></div>
      </div>

      <div id="netbankingSection" class="card hidden">
        <div class="form-row"><label for="accountNumber">Account Number</label><input id="accountNumber"></div>
      </div>

      <div id="upiSection" class="card hidden">
        <div class="form-row"><label for="upi">UPI ID</label><input id="upi"></div>
      </div>

      <div class="actions">
        <button id="payNowBtn" type="button">Pay Now</button>
        <button id="cancelPaymentBtn" type="button" class="secondary">Cancel</button>
      </div>
    </section>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/core/security.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/core/pricing.js"></script>
  <script src="js/modules/fare-discount.module.js"></script>
  <script src="js/modules/payment.module.js"></script>
  <script src="js/app.bootstrap.js"></script>
</body>
</html>
